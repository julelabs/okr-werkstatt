<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lernpfad | Vom Vorsatz zum OKR-Set</title>
<link rel="stylesheet" href="shared/tokens.css" />
<style>
  body { background: #fff; overflow-x: clip; --r-card: 6px; --r-panel: 10px; }
  .wrap { width: min(1160px, 92vw); margin-inline: auto; }

  nav.top { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 12px clamp(18px,4vw,40px); background: rgba(255,255,255,0.93); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(54,52,157,0.1); }
  nav.top a.home { display: flex; align-items: center; gap: 11px; text-decoration: none; }
  nav.top .brand { font-family: var(--display); font-weight: 700; font-size: 13px; color: var(--blau); line-height: 1.25; }
  nav.top .right { display: flex; gap: 3px; align-items: center; }
  nav.top .right a { font-family: var(--display); font-weight: 600; font-size: 13.5px; text-decoration: none; color: rgba(13,12,43,0.52); padding: 7px 11px; border-radius: 7px; transition: background .15s, color .15s; }
  nav.top .right a:hover { background: rgba(54,52,157,0.06); color: var(--blau); }
  nav.top .right a.act { color: var(--blau); font-weight: 700; }
  nav.top .right a.q { background: var(--minze); color: var(--dunkel); font-weight: 700; margin-left: 6px; }
  nav.top .right a.q:hover { filter: brightness(1.07); background: var(--minze); }
  @media (max-width: 760px) {
    nav.top .right a:not(.q) { display: none; }
    nav.top .right a.q { margin-left: 0; }
  }

  /* ── LERNPFAD HERO ── */
  .lp-hero { background: var(--lavendel); margin-inline: calc(50% - 50vw); padding: clamp(32px,5vh,56px) 0 clamp(56px,8vh,80px); }
  .lp-hero .kicker { font-family: var(--display); font-weight: 800; font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(54,52,157,0.5); margin-bottom: 10px; }
  .lp-hero h1 { font-size: clamp(2.1rem,4.2vw,3.2rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.03; margin: 0; max-width: 22ch; text-wrap: balance; color: var(--dunkel); }
  .lp-hero .sub { font-size: clamp(1rem,1.5vw,1.1rem); color: var(--fg-2); line-height: 1.6; margin-top: 12px; max-width: 60ch; }
  .lp-hero .sub b { color: var(--fg); font-weight: 600; }

  /* ── FOCUS SELECT ── */
  .focus { padding: clamp(44px,6vh,64px) 0 80px; }
  .focus .lead-no { font-family: var(--display); font-weight: 800; font-size: 14px; color: var(--blau); }
  .focus h1 { font-size: clamp(2.1rem,4.6vw,3.3rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.03; margin-top: 10px; max-width: 18ch; text-wrap: balance; }
  .focus-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 18px; margin-top: 40px; max-width: 820px; }
  @media (max-width: 680px) { .focus-grid { grid-template-columns: 1fr; } }

  .fcard { text-align: left; cursor: pointer; background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-panel); padding: 26px 24px 24px; transition: all .2s var(--ease); display: flex; flex-direction: column; min-height: 220px; font-family: var(--body); }
  .fcard:hover { border-color: var(--blau-40); transform: translateY(-4px); box-shadow: 0 18px 44px rgba(54,52,157,0.14); }
  .type-badge { display: inline-flex; align-items: center; font-family: var(--display); font-weight: 700; font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 11px; border-radius: 999px; margin-bottom: 16px; width: fit-content; }
  .fcard.fachlich .type-badge { background: var(--blau); color: #fff; }
  .fcard.prozess .type-badge { background: var(--minze); color: var(--dunkel); }
  .fcard h3 { font-size: 1.38rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; color: var(--fg); margin: 0; }
  .fcard p { font-size: 14.5px; color: var(--fg-2); line-height: 1.5; margin-top: 10px; }
  .fcard .start { margin-top: auto; padding-top: 18px; font-family: var(--display); font-weight: 800; font-size: 14px; color: var(--blau); display: flex; align-items: center; gap: 8px; }
  .fcard .start .ch { transition: transform .2s var(--ease); }
  .fcard:hover .start .ch { transform: translateX(5px); }

  /* ── STAGE ── */
  .stage { display: grid; grid-template-columns: 232px 1fr 312px; gap: clamp(24px,3vw,46px); padding: clamp(28px,4vh,48px) 0 100px; align-items: start; }
  @media (max-width: 1080px) { .stage { grid-template-columns: 1fr; } .rail, .builder { position: static !important; } }

  /* ── RAIL ── */
  .rail { position: sticky; top: 80px; }
  .rail .chap { font-family: var(--display); font-weight: 800; font-size: 11.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--blau); margin: 20px 0 9px; }
  .rail .chap:first-of-type { margin-top: 0; }
  .rail ol { list-style: none; }
  .rail li { display: flex; align-items: center; gap: 12px; padding: 6px 0; cursor: pointer; color: #6b6995; font-size: 14.5px; line-height: 1.35; transition: color .2s var(--ease); }
  .rail li .dot { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; border: 2px solid var(--line-strong); display: grid; place-items: center; font-size: 11px; font-weight: 700; font-family: var(--display); flex-shrink: 0; transition: background .25s, border-color .25s, color .25s; }
  .rail li:hover { color: var(--fg-2); }
  .rail li.done .dot { background: var(--minze); border-color: var(--minze); color: var(--dunkel); }
  .rail li.done { color: var(--fg-2); }
  .rail li.active { color: var(--fg); font-weight: 600; }
  .rail li.active .dot { background: var(--blau); border-color: var(--blau); color: #fff; }
  .rail-mini { display: none; font-family: var(--display); font-weight: 700; font-size: 13px; color: var(--blau); }
  @media (max-width: 1080px) {
    .rail .chap, .rail ol { display: none; }
    .rail-mini { display: block; }
  }

  /* ── PANEL ── */
  .panel { min-height: 420px; --colw: 64ch; }
  .step-no { font-family: var(--display); font-weight: 800; font-size: 13px; color: var(--blau); }
  .panel h1 { font-size: clamp(1.8rem,3.4vw,2.7rem); font-weight: 800; letter-spacing: -0.025em; margin-top: 8px; line-height: 1.05; text-wrap: balance; }
  .expl { font-size: clamp(1rem,1.45vw,1.14rem); color: var(--fg-2); line-height: 1.62; margin-top: 16px; max-width: var(--colw); }
  .expl b { color: var(--fg); font-weight: 600; }

  /* ── DECISION GROUP: context → prompt → choices, one column ── */
  .dgroup { margin-top: 26px; max-width: var(--colw); }
  .prompt { font-family: var(--display); font-weight: 700; font-size: 14.5px; color: var(--fg); margin: 24px 0 0; }
  .dgroup .cgrid { margin-top: 12px; }

  /* ── ARTIFACT CARD (quiet input/context) ── */
  .artifact { background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-card); padding: 16px 20px; max-width: var(--colw); }
  .problem-start { margin-top: 22px; }
  .artifact .alabel { font-family: var(--display); font-weight: 800; font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--blau); opacity: 0.65; margin-bottom: 6px; }
  .artifact .atext { font-size: 1.05rem; line-height: 1.5; color: var(--fg); font-style: italic; }
  .artifact .anote { margin-top: 8px; font-size: 13.5px; color: var(--fg-muted); line-height: 1.45; }

  /* ── PAYOFF QUOTE CARD (Objective + final set only) ── */
  .quote-card { background: var(--blau); color: #fff; border-radius: 4px; padding: 24px 28px; margin-top: 22px; position: relative; max-width: var(--colw); box-shadow: 0 16px 40px rgba(54,52,157,0.2); }
  .quote-card::before { content: "\201D"; position: absolute; top: -20px; right: 16px; font-family: var(--display); font-weight: 800; font-size: 80px; color: var(--minze); line-height: 1; }
  .quote-card .qkind { font-family: var(--display); font-weight: 700; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--minze); display: block; margin-bottom: 10px; }
  .quote-card .qt { font-style: italic; font-size: clamp(1.1rem,1.75vw,1.38rem); line-height: 1.45; }

  /* ── GUIDANCE NOTE (plain text inside the decision group, same voice as .expl) ── */
  .dnote { margin: 16px 0 0; max-width: var(--colw); font-size: clamp(1rem,1.45vw,1.14rem); color: var(--fg-2); line-height: 1.62; }
  .dnote b { color: var(--blau); font-weight: 700; }

  /* ── CHOICE CARDS (unified) ── */
  .cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; max-width: var(--colw); }
  @media (max-width: 640px) { .cgrid { grid-template-columns: 1fr; } }
  .ccard { text-align: left; cursor: pointer; background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-card); padding: 18px 18px 16px; transition: all .2s var(--ease); display: flex; flex-direction: column; gap: 7px; font-family: var(--body); }
  .ccard:hover { border-color: var(--blau-40); box-shadow: 0 6px 24px rgba(54,52,157,0.1); }
  .ccard.selected { border-color: var(--blau); background: rgba(54,52,157,0.05); box-shadow: 0 6px 24px rgba(54,52,157,0.14); }
  .ccard .cnum { font-family: var(--display); font-weight: 800; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--fg-muted); }
  .ccard.selected .cnum { color: var(--blau); }
  .ccard h4 { font-size: 1.08rem; font-weight: 700; line-height: 1.28; color: var(--fg); margin: 0; }
  .ccard p { font-size: 14.75px; color: var(--fg-2); line-height: 1.55; margin: 0; }
  .ccard .sel-mark { display: none; align-items: center; gap: 5px; margin-top: 7px; font-family: var(--display); font-weight: 700; font-size: 11px; color: var(--blau); background: rgba(54,52,157,0.1); padding: 4px 10px 4px 8px; border-radius: 999px; width: fit-content; }
  .ccard .sel-mark svg { width: 11px; height: 11px; flex-shrink: 0; }
  .ccard.selected .sel-mark { display: flex; }

  /* ── QUIET SUPPORTING NOTE (below payoff card) ── */
  .quiet-note { margin-top: 14px; max-width: var(--colw); font-size: 14px; color: var(--fg-muted); line-height: 1.55; }

  /* ── HEBEL CARDS ── */
  .hebel-list { display: flex; flex-direction: column; gap: 9px; margin-top: 18px; max-width: var(--colw); }
  .hebel-card { cursor: pointer; background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-card); padding: 14px 16px; transition: all .2s var(--ease); display: flex; align-items: flex-start; gap: 13px; text-align: left; font-family: var(--body); }
  .hebel-card:hover:not([disabled]) { border-color: var(--blau-40); }
  .hebel-card.selected { border-color: var(--blau); background: rgba(54,52,157,0.05); }
  .hebel-card.preselected { border-color: var(--minze); background: rgba(77,255,176,0.08); cursor: default; }
  .hebel-card .hbox { width: 21px; height: 21px; min-width: 21px; border-radius: 6px; border: 2px solid var(--line-strong); display: grid; place-items: center; transition: all .2s; flex-shrink: 0; margin-top: 1px; }
  .hebel-card.selected .hbox { background: var(--blau); border-color: var(--blau); }
  .hebel-card.preselected .hbox { background: var(--minze); border-color: var(--minze); }
  .hebel-card .hbox svg { width: 12px; height: 12px; opacity: 0; }
  .hebel-card.selected .hbox svg { opacity: 1; stroke: #fff; }
  .hebel-card.preselected .hbox svg { opacity: 1; stroke: #0D0C2B; }
  .hebel-card .hlabel { font-size: 14.5px; font-weight: 600; color: var(--fg); line-height: 1.25; }
  .hebel-card .hdesc { font-size: 13px; color: var(--fg-2); line-height: 1.4; margin-top: 3px; }
  .hebel-card .hbadge { display: inline-block; font-family: var(--display); font-weight: 700; font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: #0a6640; background: rgba(77,255,176,0.3); padding: 2px 7px; border-radius: 999px; margin-left: 7px; vertical-align: middle; }
  .hebel-warn { margin-top: 12px; font-size: 13px; color: var(--fg-muted); font-family: var(--display); font-weight: 700; display: none; }
  .hebel-warn.show { display: block; }

  /* ── HEBEL → KR PAIRS ── */
  .kr-pairs { display: flex; flex-direction: column; gap: 14px; margin-top: 22px; max-width: var(--colw); }
  .kr-pair { background: #fff; border: 1.5px solid var(--line); border-radius: var(--r-card); padding: 16px 20px; }
  .kr-pair .plab { font-family: var(--display); font-weight: 800; font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
  .kr-pair .pfrom .plab { color: var(--fg-muted); }
  .kr-pair .pfrom p { font-size: 13.5px; color: var(--fg-2); line-height: 1.5; margin: 0; }
  .kr-pair .pto { margin-top: 12px; }
  .kr-pair .pto .plab { color: #0a6640; display: inline-flex; align-items: center; gap: 6px; }
  .kr-pair .pto .plab::before { content: ''; width: 8px; height: 8px; border-radius: 2px; background: var(--minze); }
  .kr-pair .pto p { font-size: 14.5px; color: var(--fg); line-height: 1.55; margin: 0; }

  /* ── FINAL KR LIST + RECAP ── */
  .kr-list { display: flex; flex-direction: column; gap: 18px; margin-top: 20px; max-width: var(--colw); }
  .kr-item { padding: 10px 0; }
  .kr-item .krlabel { font-family: var(--display); font-weight: 800; font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--blau); margin-bottom: 5px; opacity: 0.7; display: inline-flex; align-items: center; gap: 6px; }
  .kr-item .krlabel::before { content: ''; width: 8px; height: 8px; border-radius: 2px; background: var(--blau); }
  .kr-item .krtext { font-size: 14.5px; line-height: 1.6; color: var(--fg); }

  .recap { margin-top: 36px; max-width: var(--colw); }
  .recap .rhead { font-family: var(--display); font-weight: 800; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--blau); margin-bottom: 4px; }
  .recap .rrow { display: flex; align-items: flex-start; gap: 13px; padding: 11px 0; }
  .recap .rrow + .rrow { border-top: 1px solid var(--lavendel); }
  .recap .rcircle { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; background: var(--minze); display: grid; place-items: center; flex-shrink: 0; margin-top: 1px; }
  .recap .rcircle svg { width: 12px; height: 12px; stroke: var(--dunkel); }
  .recap .rtext { font-size: 14.5px; color: var(--fg); line-height: 1.5; }

  /* ── BUTTONS ── */
  .panel-nav { display: flex; gap: 12px; margin-top: 36px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--display); font-weight: 700; font-size: 15px; cursor: pointer; border: none; border-radius: 8px; padding: 12px 22px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: transform .15s var(--ease), background .2s var(--ease), filter .2s var(--ease); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blau); color: #fff; }
  .btn-primary:hover { background: var(--blau-80); }
  .btn-mint { background: var(--minze); color: var(--dunkel); }
  .btn-mint:hover { filter: brightness(1.07); }
  .btn-ghost { background: transparent; color: var(--blau); border: 1.5px solid var(--line-strong); }
  .btn-ghost:hover { background: var(--lavendel); }
  .btn[disabled] { opacity: .35; pointer-events: none; }
  .btn .ch { letter-spacing: -0.05em; }
  .nav-hint { font-size: 13px; color: var(--fg-muted); font-family: var(--display); }

  /* ── BUILDER ── */
  .builder { position: sticky; top: 80px; background: var(--lavendel); border-radius: var(--r-panel); padding: 20px; }
  .builder .bhead { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .builder h3 { font-family: var(--display); font-weight: 800; font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--blau); }
  .builder .bswitch { font-family: var(--display); font-weight: 700; font-size: 12px; color: #74729b; cursor: pointer; background: none; border: none; text-decoration: underline; text-underline-offset: 2px; }
  .builder .bswitch:hover { color: var(--blau); }
  .builder .focus-tag { margin-top: 4px; font-size: 13px; color: var(--fg-2); font-style: italic; line-height: 1.4; }
  .builder .bslot { margin-top: 17px; }
  .builder .blab { font-family: var(--display); font-weight: 700; font-size: 12px; letter-spacing: 0.03em; text-transform: uppercase; color: #74729b; }
  .builder .bsuffix { text-transform: none; letter-spacing: 0; font-weight: 600; color: var(--fg-muted); opacity: 0.8; }
  .bval { margin-top: 7px; font-size: 14.25px; line-height: 1.5; color: var(--fg); padding: 12px 14px; background: #fff; border-radius: var(--r-card); border: 1px solid var(--blau-40); }
  .bslot.obj .bval { background: var(--blau); color: #fff; border-color: var(--blau); font-style: italic; }
  .bempty { margin-top: 7px; font-size: 13.5px; color: #74729b; font-style: italic; line-height: 1.5; }
  .bempty.pending { color: var(--blau); animation: bpulse 2s ease-in-out infinite; }
  @keyframes bpulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  .bkrs { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; }
  .bkrs .bval { margin-top: 0; }
  .bkr-lite { font-size: 13.5px; line-height: 1.45; color: var(--fg); background: #fff; border: 1px solid var(--line); border-radius: var(--r-card); padding: 10px 12px; }
  .bnote { margin-top: 9px; font-size: 12.5px; color: #74729b; line-height: 1.5; }
  .prob-pill { margin-top: 7px; font-size: 13.5px; color: var(--fg-2); line-height: 1.45; font-style: italic; padding: 9px 12px; background: rgba(255,255,255,0.8); border-radius: var(--r-card); border: 1px solid rgba(54,52,157,0.1); }

  /* ── FINAL ── */
  .done-line { display: inline-flex; align-items: center; gap: 7px; margin-top: 40px; font-family: var(--display); font-weight: 800; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: #0a6640; }
  .done-line svg { width: 12px; height: 12px; }
  .final-cta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; align-items: center; }
  .link-quiet { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--fg-muted); background: none; border: none; cursor: pointer; padding: 12px 6px; text-decoration: underline; text-underline-offset: 3px; }
  .link-quiet:hover { color: var(--blau); }
</style>
</head>

<script>

const PATHS = {
  buerger: {
    label: "Bürgerservice digitalisieren",
    type: "fachlich",
    typeLabel: "Fachlich-inhaltlich",
    desc: "An einem konkreten Antragsbeispiel von der vagen Absicht zum fertigen OKR-Set.",
    vorsatz: "Der Wohngeld-Antrag soll bürgerfreundlicher werden.",

    problems: {

        idealzustand: "Bürger*innen wissen vor und während der Antragstellung, welche Unterlagen sie benötigen und warum diese gebraucht werden.",
        idealNote: "",

          { text: "Die häufigsten fehlenden oder falschen Unterlagen werden identifiziert. Klare Hinweise zeigen, was gebraucht wird, in welcher Form und wie es eingereicht werden soll.", objective: "Für die häufigsten unvollständigen Stellen im Wohngeld-Antrag ist geklärt, welche Unterlagen fehlen oder falsch eingereicht werden, und verständliche Hinweise zu Einreichungsform und Format liegen vor.", preHebel: 0 },
          { text: "Für die wichtigsten Unterlagen wird verständlich erklärt, warum sie benötigt werden und wo Bürger*innen sie herbekommen, sodass Antragstellende selbst aktiv werden können.", objective: "Für die wichtigsten Unterlagen im Wohngeld-Antrag liegt eine verständliche Erklärung vor, warum sie benötigt werden und wo Bürger*innen sie beschaffen, sodass die Einreichung mit weniger Rückfragen gelingt.", preHebel: 2 }
        ],

  { id: 'objective', chap: 'Kapitel 1 · Vom Vorsatz zum Objective',    short: 'Objective',           no: 'Schritt 3' },
  { id: 'hebel',     chap: 'Kapitel 2 · Vom Objective zu Key Results', short: 'Hebel wählen',        no: 'Schritt 4', isChoice: true },
  { id: 'krs',       chap: 'Kapitel 2 · Vom Objective zu Key Results', short: 'Hebel → Key Results', no: 'Schritt 5' },
  { id: 'final',     chap: 'Geschafft',                                short: 'Fertiges Set',        no: 'Fertig' }
];
const I_OBJECTIVE = 2, I_HEBEL = 3, I_KRS = 4;

const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let pathId        = null;
let problemId     = null;
let optionIdx     = null;
let selectedHebel = [];   // hebel indices; preselected index always included
let cur           = 0;
const seen        = new Set();

const root = document.getElementById('root');

function P()    { return PATHS[pathId]; }
function Prob() { return P().problems[problemId]; }
function Opt()  { return Prob().options[optionIdx]; }
function objective() { return (optionIdx !== null && problemId) ? Opt().objective : null; }
function selectedKRs() {
  if (!problemId) return [];
  return [...selectedHebel].sort((a,b)=>a-b).map(i => ({ label: Prob().hebel[i].label, desc: Prob().hebel[i].desc, kr: Prob().hebel[i].kr }));
}
function trimSeen() { for (const k of [...seen]) if (k > cur) seen.delete(k); }
function save() {
  localStorage.setItem('lp3_path',    pathId||'');
  localStorage.setItem('lp3_problem', problemId||'');
  localStorage.setItem('lp3_option',  optionIdx!==null ? String(optionIdx) : '');
  localStorage.setItem('lp3_hebel',   JSON.stringify(selectedHebel));
  localStorage.setItem('lp3_step',    String(cur));
}

/* ═══════════════════════════════════════════
   PATH SELECT
═══════════════════════════════════════════ */
function showFocus() {
  const cards = Object.entries(PATHS).map(([id, p]) => `
    <button class="fcard ${p.type}" data-pid="${id}">
      <span class="type-badge">${p.typeLabel}</span>
      <h3>${p.label}</h3>
      <p>${p.desc}</p>
      <span class="start">Diesen Weg gehen <span class="ch">›››</span></span>
    </button>`).join('');
  root.innerHTML = `
    <div class="lp-hero">
      <div class="wrap">
        <div class="kicker">03 · Lernpfad</div>
        <h1>Vom vagen Vorsatz zum echten OKR-Set.</h1>
        <p class="sub">OKRs funktionieren für <b>fachlich-inhaltliche Ziele</b> genauso gut wie für <b>prozessorientierte Ziele</b>. Such dir ein Beispiel aus und entwickle Schritt für Schritt ein eigenes OKR-Set.</p>
      </div>
    </div>
    <div class="focus">
      <div class="lead-no">Lernpfad wählen</div>
      <h1>Wo fängst du an?</h1>
      <div class="focus-grid">${cards}</div>
    </div>`;
  root.querySelectorAll('.fcard').forEach(c => c.addEventListener('click', () => {
    pathId=c.dataset.pid; problemId=null; optionIdx=null; selectedHebel=[]; cur=0; seen.clear(); seen.add(0);
    save(); renderStage(); window.scrollTo({top:0,behavior:'smooth'});
  }));
}

/* ═══════════════════════════════════════════
   STAGE
═══════════════════════════════════════════ */
function renderStage() {
  root.innerHTML = `
    <div class="stage">
      <aside class="rail" id="rail"></aside>
      <main class="panel" id="panel"></main>
      <aside class="builder" id="builder"></aside>
    </div>`;
  buildRail(); render();
}

function buildRail() {
  const rail = document.getElementById('rail');
  let html = `<div class="rail-mini" id="railmini"></div>`; let lastChap = '';
  STEPS.forEach((s,i) => {
    if (s.chap !== lastChap) { if (lastChap) html += `</ol>`; html += `<div class="chap">${s.chap}</div><ol>`; lastChap=s.chap; }
    html += `<li data-i="${i}"><span class="dot">${i+1}</span><span class="lbl">${s.short}</span></li>`;
  });
  html += `</ol>`;
  rail.innerHTML = html;
  rail.querySelectorAll('li').forEach(li => li.addEventListener('click', () => {
    const i=+li.dataset.i;
    if (seen.has(i) || (i===cur+1 && canProceed())) go(i);
  }));
}

function updateRail() {
  const rail = document.getElementById('rail'); if (!rail) return;
  rail.querySelectorAll('li').forEach(li => {
    const i=+li.dataset.i;
    li.classList.toggle('active', i===cur);
    li.classList.toggle('done', seen.has(i) && i!==cur);
  });
  const mini = document.getElementById('railmini');
  if (mini) mini.textContent = `${STEPS[cur].chap.split(' · ')[0]} · Schritt ${cur+1} von ${STEPS.length}`;
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function canProceed() {
  const s = STEPS[cur];
  if (s.id==='problem') return problemId!==null;
  if (s.id==='schritt') return optionIdx!==null;
  if (s.id==='hebel')   return selectedHebel.length>=2;
  return true;
}

function render() {
  seen.add(cur);
  const s = STEPS[cur];
  const panel = document.getElementById('panel');
  let body = `<div class="step-no">${s.no}</div>`;

  if (s.id==='problem')        body += rProblem();
  else if (s.id==='schritt')   body += rSchritt();
  else if (s.id==='objective') body += rObjective();
  else if (s.id==='hebel')     body += rHebel();
  else if (s.id==='krs')       body += rKrs();
  else                         body += rFinal();

  if (s.id !== 'final') {
    const ok = canProceed();
    body += `<div class="panel-nav">
      <button class="btn btn-ghost" id="prev" ${cur===0?'disabled':''}>‹ Zurück</button>
      <button class="btn btn-primary" id="next" ${ok?'':'disabled'}>Weiter <span class="ch">›</span></button>
      ${s.isChoice && !ok && s.id!=='hebel' ? `<span class="nav-hint">Bitte wähle eine Option aus.</span>` : ''}
    </div>`;
  }

  panel.innerHTML = body;
  bindEvents(s);
  renderBuilder();
  updateRail(); save();
}

/* ── step renderers ── */
function rProblem() {
  const probs = Object.entries(P().problems);
  const letters = ['A','B','C','D'];
  return `
    <h1>Was ist eigentlich das Problem?</h1>
    <div class="artifact problem-start">
      <div class="alabel">Euer Startpunkt</div>
      <div class="atext">„${P().vorsatz}“</div>
    </div>
    <p class="expl">Das ist ein guter Vorsatz, aber noch kein Objective. „${P().vorsatzKurz}“ ist wie „gesünder leben“: Alle nicken, aber alle meinen etwas anderes. Wähle deshalb zuerst das konkrete Problem.</p>
    <div class="dgroup">
      <p class="prompt">Wähle das konkrete Problem:</p>
      <div class="cgrid">
        ${probs.map(([id,pr],i) => `
          <button class="ccard${problemId===id?' selected':''}" data-pid="${id}">
            <span class="cnum">Problem ${letters[i]}</span>
            <h4>${pr.label}</h4>
            <p>${pr.text}</p>
            <span class="sel-mark">${CHECK_SVG} Ausgewählt</span>
          </button>`).join('')}
      </div>
    </div>`;
}

function rSchritt() {
  const pr = Prob();
  return `
    <h1>Was davon ist in 3 Monaten realistisch?</h1>
    <p class="expl">Stell dir kurz vor, das Problem wäre wirklich gelöst: Wie sähe die Arbeit dann aus? Dieser Idealzustand hilft, die Richtung zu klären. Er ist bewusst größer als ein Quartal.</p>
    <div class="dgroup">
      <div class="artifact">
        <div class="alabel">Idealzustand / Zielbild</div>
        <div class="atext">„${pr.idealzustand}“</div>
        ${pr.idealNote ? `<div class="anote">${pr.idealNote}</div>` : ''}
      </div>
      <p class="dnote">Der Idealzustand gibt jetzt die Richtung vor. Für ein OKR-Quartal ist er aber natürlich noch zu groß. Genau deshalb brechen wir ihn jetzt herunter: auf einen nächsten Schritt, der in 3 Monaten realistisch erreichbar ist.</p>
      <p class="prompt">Wähle den realistischen 3-Monats-Schritt:</p>
      <div class="cgrid">
        ${pr.options.map((o,i) => `
          <button class="ccard${optionIdx===i?' selected':''}" data-oi="${i}">
            <span class="cnum">Fokus ${i+1}</span>
            <h4>${pr.hebel[o.preHebel].label}</h4>
            <p>${o.text}</p>
            <span class="sel-mark">${CHECK_SVG} Ausgewählt</span>
          </button>`).join('')}
      </div>
    </div>`;
}

function rObjective() {
  return `
    <h1>Dein Objective ist entstanden</h1>
    <p class="expl">Aus deinem Problem und deinem 3-Monats-Schritt ist ein Objective entstanden: ein greifbarer Zustand am Quartalsende.</p>
    <div class="quote-card"><span class="qkind">Fertiges Objective</span><div class="qt">${objective()}</div></div>
    <p class="quiet-note">Es beschreibt, was am Ende anders ist, nicht, welche Aufgaben erledigt wurden.</p>`;
}

function rHebel() {
  const pr = Prob();
  const preIdx = Opt().preHebel;
  return `
    <h1>Welche Hebel stecken im Objective?</h1>
    <p class="expl">Der grün markierte Hebel ist gesetzt; er gehört direkt zu deinem 3-Monats-Schritt. <b>Wähle 1–2 weitere aus.</b> Aus jedem Hebel entsteht genau ein Key Result. Du siehst sie rechts direkt in deinem Set.</p>
    <p class="dnote"><b>Tipp:</b> Achte darauf, dass mindestens ein Hebel am Ende überprüft, ob deine Änderung in der Praxis wirkt. Sonst weißt du am Quartalsende nicht, ob sie etwas gebracht hat.</p>
    <div class="hebel-list">
      ${pr.hebel.map((h,i) => {
        const isPre = i===preIdx;
        const isSel = selectedHebel.includes(i);
        return `<button class="hebel-card${isSel?' selected':''}${isPre?' preselected':''}" data-hi="${i}"${isPre?' disabled':''}>
          <div class="hbox">${CHECK_SVG}</div>
          <div>
            <div class="hlabel">${h.label}${isPre?'<span class="hbadge">Gesetzt</span>':''}</div>
            <div class="hdesc">${h.desc}</div>
          </div>
        </button>`;
      }).join('')}
    </div>
    <div class="hebel-warn${selectedHebel.length<2?' show':''}" id="hwarn">
      ${selectedHebel.length<2?`Wähle noch mindestens ${2-selectedHebel.length} weiteren Hebel aus.`:''}
    </div>`;
}

function rKrs() {
  const krs = selectedKRs();
  return `
    <h1>Aus Hebeln werden Key Results</h1>
    <p class="expl">Jeder gewählte Hebel wird jetzt in einen überprüfbaren Satz übersetzt. Nicht jedes Key Result braucht eine Zahl: „liegt vor“ oder „wurde geprüft“ reicht oft. Hauptsache, am Quartalsende ist klar: erreicht oder nicht erreicht. Die Excel versteht keine Hoffnung, leider.</p>
    <div class="kr-pairs">
      ${krs.map((k,i) => `
        <div class="kr-pair">
          <div class="pfrom"><div class="plab">Hebel · ${k.label}</div><p>${k.desc}</p></div>
          <div class="pto"><div class="plab">Key Result ${i+1}</div><p>${k.kr}</p></div>
        </div>`).join('')}
    </div>`;
}

function rFinal() {
  const obj = objective();
  const krs = selectedKRs();
  return `
    <h1>Dein erstes OKR-Set steht.</h1>
    <p class="expl">Vom vagen Vorsatz zu einem Objective mit ${krs.length} überprüfbaren Key Results. Genau diesen Weg kannst du jetzt mit euren echten Zielen gehen. Das Ergebnis kannst du anschließend vom OKRKritikBot gegenlesen lassen.</p>
    <div class="quote-card"><span class="qkind">Objective · ${Prob().short}</span><div class="qt">${obj}</div></div>
    <div class="kr-list">
      ${krs.map((k,i) => `
        <div class="kr-item">
          <div class="krlabel">Key Result ${i+1} · ${k.label}</div>
          <div class="krtext">${k.kr}</div>
        </div>`).join('')}
    </div>
    <div class="recap">
      <div class="rhead">Daran erkennst du ein gutes Set</div>
      <div class="rrow"><div class="rcircle">${CHECK_SVG}</div><div class="rtext">Das Objective beschreibt einen Zustand am Quartalsende, kein To-do.</div></div>
      <div class="rrow"><div class="rcircle">${CHECK_SVG}</div><div class="rtext">Jeder gewählte Hebel ist genau ein Key Result geworden.</div></div>
      <div class="rrow"><div class="rcircle">${CHECK_SVG}</div><div class="rtext">Jedes Key Result ist am Quartalsende eindeutig überprüfbar: erreicht oder nicht.</div></div>
      <div class="rrow"><div class="rcircle">${CHECK_SVG}</div><div class="rtext">Überprüfbar heißt nicht zwingend: mit Zahl.</div></div>
    </div>
    <div class="done-line">${CHECK_SVG} Lernpfad abgeschlossen</div>
    <div class="final-cta">
      <a class="btn btn-mint" href="https://chatgpt.com/g/g-696805cd1cf881918217c5ffe0626a2d-okrkritikbot3000" target="_blank" rel="noopener">OKRKritikBot fragen <span class="ch">↗</span></a>
      <a class="btn btn-ghost" href="quiz.html">Jetzt das Quiz <span class="ch">›</span></a>
      <button class="link-quiet" id="restart">Anderen Pfad wählen</button>
    </div>`;
}

/* ═══════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════ */
function bindEvents(s) {
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const restart = document.getElementById('restart');

  if (prev) prev.addEventListener('click', () => go(cur-1));
  if (next) next.addEventListener('click', () => go(cur+1));
  if (restart) restart.addEventListener('click', reset);

  if (s.id==='problem') {
    document.querySelectorAll('.ccard[data-pid]').forEach(c => c.addEventListener('click', () => {
      if (problemId !== c.dataset.pid) { problemId=c.dataset.pid; optionIdx=null; selectedHebel=[]; trimSeen(); }
      render();
    }));
  }

  if (s.id==='schritt') {
    document.querySelectorAll('.ccard[data-oi]').forEach(c => c.addEventListener('click', () => {
      const oi=+c.dataset.oi;
      if (optionIdx !== oi) { optionIdx=oi; selectedHebel=[Prob().options[oi].preHebel]; trimSeen(); }
      render();
    }));
  }

  if (s.id==='hebel') {
    document.querySelectorAll('.hebel-card:not([disabled])').forEach(c => c.addEventListener('click', () => {
      const hi=+c.dataset.hi;
      if (selectedHebel.includes(hi)) {
        selectedHebel=selectedHebel.filter(x=>x!==hi);
      } else if (selectedHebel.length<3) {
        selectedHebel.push(hi);
      }
      refreshHebel(); renderBuilder(); save();
    }));
  }
}

function refreshHebel() {
  document.querySelectorAll('.hebel-card:not(.preselected)').forEach(c => {
    const hi=+c.dataset.hi;
    c.classList.toggle('selected', selectedHebel.includes(hi));
  });
  const warn = document.getElementById('hwarn');
  if (warn) {
    const rem = 2-selectedHebel.length;
    warn.classList.toggle('show', rem>0);
    warn.textContent = rem>0 ? `Wähle noch mindestens ${rem} weiteren Hebel aus.` : '';
  }
  const next = document.getElementById('next');
  if (next) next.disabled = selectedHebel.length<2;
}

function reset() {
  ['lp3_path','lp3_problem','lp3_option','lp3_hebel','lp3_step'].forEach(k => localStorage.removeItem(k));
  pathId=null; problemId=null; optionIdx=null; selectedHebel=[]; cur=0; seen.clear();
  showFocus(); window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════════
   BUILDER: live preview, no skeleton/lock noise
═══════════════════════════════════════════ */
function renderBuilder() {
  const b = document.getElementById('builder'); if (!b) return;
  const objOpen    = optionIdx!==null && cur>=I_OBJECTIVE;
  const objPending = optionIdx!==null && cur<I_OBJECTIVE;
  const krPhase    = cur>=I_KRS ? 'full' : (cur>=I_HEBEL ? 'label' : 'none');

  let html = `
    <div class="bhead"><h3>Dein OKR-Set</h3><button class="bswitch" id="bswitch">Pfad wechseln</button></div>
    <div class="focus-tag">${P().typeLabel}: ${P().label}</div>`;

  if (problemId) {
    html += `<div class="bslot"><span class="blab">Gewähltes Problem</span><div class="prob-pill">${Prob().label}</div></div>`;
  }

  html += `<div class="bslot obj"><span class="blab">Objective${objOpen?'':' <span class="bsuffix">· Kapitel 1</span>'}</span>`;
  if (objOpen)         html += `<div class="bval">${objective()}</div>`;
  else if (objPending) html += `<div class="bempty pending">Entsteht gerade aus deinen Entscheidungen …</div>`;
  else                 html += `<div class="bempty">Entsteht in Kapitel 1.</div>`;
  html += `</div>`;

  html += `<div class="bslot"><span class="blab">Key Results${krPhase==='none'?' <span class="bsuffix">· Kapitel 2</span>':''}</span>`;
  if (krPhase==='none') {
    html += `<div class="bempty">Folgen in Kapitel 2.</div>`;
  } else if (krPhase==='label') {
    const krs = selectedKRs();
    html += `<div class="bkrs">${krs.map((k,i)=>`<div class="bkr-lite">KR ${i+1} · ${k.label}</div>`).join('')}</div>`;
    html += `<div class="bnote">Jeder Hebel wird in Schritt 5 zu einem überprüfbaren Satz.</div>`;
  } else {
    const krs = selectedKRs();
    html += `<div class="bkrs">${krs.map((k,i)=>`<div class="bval">KR ${i+1}: ${k.kr}</div>`).join('')}</div>`;
  }
  html += `</div>`;

  b.innerHTML = html;
  document.getElementById('bswitch').addEventListener('click', () => {
    if (confirm('Pfad wechseln? Dein aktuelles Set wird zurückgesetzt.')) reset();
  });
}

/* ═══════════════════════════════════════════
   NAV + BOOT
═══════════════════════════════════════════ */
function go(i) {
  if (i<0||i>=STEPS.length) return;
  cur=i; render(); window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('keydown', e => {
  if (!pathId) return;
  if (e.key==='ArrowRight' && canProceed()) go(cur+1);
  if (e.key==='ArrowLeft') go(cur-1);
});

(function boot() {
  const sp=localStorage.getItem('lp3_path');
  if (sp && PATHS[sp]) {
    pathId=sp;
    const pb=localStorage.getItem('lp3_problem');
    problemId = (pb && PATHS[sp].problems[pb]) ? pb : null;
    const so=localStorage.getItem('lp3_option');
    optionIdx = (problemId && so!==null && so!=='') ? parseInt(so,10) : null;
    if (optionIdx!==null && (isNaN(optionIdx) || !Prob().options[optionIdx])) optionIdx=null;
    try { selectedHebel=JSON.parse(localStorage.getItem('lp3_hebel')||'[]'); } catch(e) { selectedHebel=[]; }
    if (!Array.isArray(selectedHebel)) selectedHebel=[];
    const ss=parseInt(localStorage.getItem('lp3_step')||'0',10);
    cur=(isNaN(ss)||ss<0||ss>=STEPS.length) ? 0 : ss;
    for (let k=0;k<=cur;k++) seen.add(k);
    renderStage();
  } else {
    showFocus();
  }
})();
